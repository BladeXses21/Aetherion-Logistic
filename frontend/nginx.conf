# nginx.conf — конфігурація для Vue SPA (Single Page Application)
#
# Ключовий момент: всі маршрути (крім файлів та /api) → index.html
# Це необхідно для Vue Router (client-side routing).
# /api/* проксується до api-gateway:8000.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Статичні файли — відповідаємо напряму (з кешем)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API проксі до api-gateway (уникаємо CORS у продакшені)
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE підтримка (відключаємо буферинг)
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 90s;
    }

    # SPA fallback — всі інші запити → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
